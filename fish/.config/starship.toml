[git_status]
disabled = true
style = "bg:overlay fg:love"
format = '[î‚¶](fg:overlay)([$all_status$ahead_behind]($style))[î‚´](fg:overlay) '
up_to_date = '[ âœ“ ](bg:overlay fg:iris)'
untracked = '[?\($count\)](bg:overlay fg:gold)'
stashed = '[\$](bg:overlay fg:iris)'
modified = '[!\($count\)](bg:overlay fg:gold)'
renamed = '[آ»\($count\)](bg:overlay fg:iris)'
deleted = '[âœک\($count\)](style)'
staged = '[++\($count\)](bg:overlay fg:gold)'
ahead = '[â‡،\(${count}\)](bg:overlay fg:foam)'
diverged = 'â‡•[\[](bg:overlay fg:iris)[â‡،\(${ahead_count}\)](bg:overlay fg:foam)[â‡£\(${behind_count}\)](bg:overlay fg:rose)[\]](bg:overlay fg:iris)'
behind = '[â‡£\(${count}\)](bg:overlay fg:rose)'

[custom.jj]
command = 'jj-starship --git-symbol "îœ‚" --no-git-status | sed "s/\x1b\[0m//g"'
when = "jj-starship detect"
shell = ["sh"]
format = "[î‚¶](fg:overlay)[[ $output ](bg:overlay)]($style)[î‚´](fg:overlay) "
style = "bg:overlay fg:rose"

[custom.git_status]
command = '''
git status --porcelain | awk '
  /^[MARC ][MD]/ || /^[MARC][MARC ]/ { modified++ }
  /^\?\?/ { untracked++ }
  /^[D ]D/ || /^D/ { deleted++ }
  END {
    if (modified + untracked + deleted == 0) {
      printf "\033[38;2;196;167;231mâœ“"
    } else {
      if (modified)  printf "\033[38;2;246;193;119mî­ƒ%d ", modified
      if (untracked) printf "\033[38;2;246;193;119mî©؟%d ", untracked
      if (deleted)   printf "\033[38;2;235;111;146mَ°†´%d ", deleted
    }
  }
'
unpushed=$(git rev-list @{u}..HEAD 2>/dev/null | wc -l | tr -d ' ')
if [ -n "$unpushed" ] && [ "$unpushed" -gt 0 ]; then
  printf "\033[38;2;137;220;235mâ‡،%d " "$unpushed"
fi
'''
when = 'git rev-parse --is-inside-work-tree 2>/dev/null && ! jj root 2>/dev/null'
shell = ["sh"]
format = "[î‚¶](fg:overlay)[[ $output ](bg:overlay)]($style)[î‚´](fg:overlay) "
style = "bg:overlay fg:love"


[time]
